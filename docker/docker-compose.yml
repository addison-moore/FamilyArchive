name: familyarchive

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-familyarchive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-familyarchive}
      POSTGRES_DB: ${POSTGRES_DB:-familyarchive}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-familyarchive} -d ${POSTGRES_DB:-familyarchive}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    command: ["pnpm", "--filter", "@familyarchive/db", "migrate"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-familyarchive}:${POSTGRES_PASSWORD:-familyarchive}@postgres:5432/${POSTGRES_DB:-familyarchive}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env (openssl rand -base64 32)}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-familyarchive}:${POSTGRES_PASSWORD:-familyarchive}@postgres:5432/${POSTGRES_DB:-familyarchive}
      REDIS_URL: redis://valkey:6379
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env (openssl rand -base64 32)}
      APP_URL: ${APP_URL:-http://localhost:3000}
      MEDIA_LOCAL_PATH: /data/media
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - media-data:/data/media
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-familyarchive}:${POSTGRES_PASSWORD:-familyarchive}@postgres:5432/${POSTGRES_DB:-familyarchive}
      REDIS_URL: redis://valkey:6379
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env (openssl rand -base64 32)}
      MEDIA_LOCAL_PATH: /data/media
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - media-data:/data/media
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:
  valkey-data:
  media-data:
